spring:
  application:
    name: car-rental
  datasource:
    url: jdbc:postgresql://localhost:5432/car_rental
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: local-dev-secret-key-32-bytes-min!!x
